
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{META_DESCRIPTION}}">
    <link rel="canonical" href="https://serabin1.github.io/posts/{{POST_SLUG}}/" />
    <title>{{POST_TITLE}}</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
</head>
<body class="no-scroll-snap">
    <div class="section post-section">
        <div class="post-content">
            <p class="post-date">{{POST_DATE}}</p>
            <div class="post-body">
                {{POST_BODY}}
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>
    <link rel="stylesheet" href="/css/blog.css">
    <script>
        hljs.highlightAll();
        hljs.initLineNumbersOnLoad();
    </script>
    <script src="/js/post.js"></script>
</body>
</html>
