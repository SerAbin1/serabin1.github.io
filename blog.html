<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Post</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="blog-post"></div>

  <script>
    const container = document.getElementById('blog-post');

    // Get URL param
    const params = new URLSearchParams(window.location.search);
    const postUrl = params.get('post');

    if (!postUrl) {
      container.innerHTML = '<p>No blog post specified.</p>';
    } else {
      fetch(postUrl)
        .then(res => res.text())
        .then(text => {
          const match = text.match(/---(.*?)---(.*)/s);
          if (!match) {
            container.innerHTML = '<p>Invalid post format.</p>';
            return;
          }

          const [, metaBlock, markdown] = match;
          const metadata = {};
          metaBlock.trim().split('\n').forEach(line => {
            const [key, ...rest] = line.split(':');
            metadata[key.trim()] = rest.join(':').trim();
          });

          const html = marked.parse(markdown.trim());
          container.innerHTML = `
            <h1>${metadata.title}</h1>
            <article>${html}</article>
          `;
        })
        .catch(err => {
          console.error(err);
          container.innerHTML = '<p>Error loading post.</p>';
        });
    }
  </script>
</body>
</html>
